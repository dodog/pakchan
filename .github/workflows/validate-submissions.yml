name: Validate and Process Submissions

on:
  issues:
    types: [opened, labeled]

jobs:
  validate:
    if: contains(github.event.issue.labels.*.name, 'submission')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Validate Submission
        run: |
          python scripts/validate_submission.py ${{ github.event.issue.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Mappings
        if: success()
        run: |
          python scripts/update_mappings.py

      - name: Commit Changes
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/mappings.json
          git commit -m "Add ${{ github.event.issue.title }}" || echo "No changes to commit"
          git push
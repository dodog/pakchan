<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pakchan - Package Database</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #30363d;
            margin-bottom: 20px;
        }
        
        header h1 {
            font-size: 1.8em;
            color: #58a6ff;
        }
        
        header p {
            color: #8b949e;
            margin-top: 8px;
        }
        
        .nav {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 16px 0;
        }
        
        .nav a {
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.9em;
        }
        
        .nav a:hover {
            text-decoration: underline;
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px 16px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 14px;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #58a6ff;
        }
        
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            font-size: 0.9em;
        }
        
        .stats-bar span {
            color: #58a6ff;
            font-weight: 600;
        }
        
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 4px 12px;
            border: 1px solid #30363d;
            border-radius: 20px;
            background: transparent;
            color: #8b949e;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.2s;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: #1f6feb;
            border-color: #1f6feb;
            color: white;
        }
        
        .package-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 8px;
            transition: border-color 0.2s;
        }
        
        .package-card:hover {
            border-color: #58a6ff;
        }
        
        .package-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        
        .package-name {
            font-weight: 600;
            font-size: 1.1em;
            color: #58a6ff;
        }
        
        .source-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
        }
        
        .badge-github { background: #1b3424; color: #2ea043; }
        .badge-gitlab { background: #341b24; color: #f778ba; }
        .badge-html   { background: #1b2434; color: #58a6ff; }
        .badge-text   { background: #34341b; color: #d2991d; }
        .badge-other  { background: #2b213a; color: #a371f7; }
        
        .source-info {
            font-size: 0.85em;
            color: #8b949e;
            margin-top: 4px;
        }
        
        .source-info code {
            background: #0d1117;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 0.9em;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }
        
        .empty {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            color: #8b949e;
            font-size: 0.85em;
            border-top: 1px solid #30363d;
            margin-top: 40px;
        }
        
        footer a {
            color: #58a6ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Pakchan Database</h1>
            <p>All packages with known changelog sources</p>
            <div class="nav">
                <a href="index.html">← Submit Package</a>
                <a href="https://github.com/dodog/pakchan">GitHub</a>
                <a href="https://dodog.github.io/pakchan/data/mappings.json">Raw JSON</a>
            </div>
        </header>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search packages..." autocomplete="off">
        </div>
        
        <div class="stats-bar">
            <div><span id="totalCount">...</span> packages</div>
            <div>Last updated: <span id="lastUpdated">...</span></div>
        </div>
        
        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="github_releases">GitHub</button>
            <button class="filter-btn" data-filter="gitlab_releases">GitLab</button>
            <button class="filter-btn" data-filter="html_page">HTML Page</button>
            <button class="filter-btn" data-filter="mozilla_releases">Mozilla</button>
            <button class="filter-btn" data-filter="text_file">Text File</button>
            <button class="filter-btn" data-filter="other">Other</button>
        </div>
        
        <div id="packageList">
            <div class="loading">Loading packages...</div>
        </div>
        
        <footer>
            <a href="index.html">Submit a new package</a> · 
            <a href="https://github.com/dodog/pakchan">View on GitHub</a>
        </footer>
    </div>
    
    <script>
        let allPackages = {};
        let currentFilter = 'all';
        
        // Load data
        fetch('https://raw.githubusercontent.com/dodog/pakchan/main/data/mappings.json')
            .then(r => r.json())
            .then(data => {
                allPackages = data.packages || {};
                document.getElementById('totalCount').textContent = data.total_packages || Object.keys(allPackages).length;
                document.getElementById('lastUpdated').textContent = data.last_updated || 'unknown';
                renderPackages();
            })
            .catch(err => {
                document.getElementById('packageList').innerHTML = 
                    '<div class="empty">⚠️ Could not load package data</div>';
            });
        
        // Search
        document.getElementById('searchInput').addEventListener('input', renderPackages);
        
        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderPackages();
            });
        });
        
        function renderPackages() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('packageList');
            
            // Filter packages
            let filtered = Object.entries(allPackages);
            
            if (searchTerm) {
                filtered = filtered.filter(([name, info]) => 
                    name.toLowerCase().includes(searchTerm) ||
                    (info.name && info.name.toLowerCase().includes(searchTerm))
                );
            }
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(([name, info]) => {
                    const sources = info.sources || [];
                    return sources.some(s => s.type === currentFilter);
                });
            }
            
            // Sort alphabetically
            filtered.sort((a, b) => a[0].localeCompare(b[0]));
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty">No packages found</div>';
                return;
            }
            
            // Render
            container.innerHTML = filtered.map(([name, info]) => {
                const sources = info.sources || [];
                return `
                    <div class="package-card">
                        <div class="package-header">
                            <span class="package-name">${escapeHtml(name)}</span>
                            ${info.name && info.name !== name ? 
                                `<span style="color:#8b949e;font-size:0.9em;">(${escapeHtml(info.name)})</span>` : ''}
                        </div>
                        ${sources.map(s => `
                            <div class="source-info">
                                ${getSourceIcon(s.type)} 
                                ${getSourceLabel(s.type)}: 
                                <code>${escapeHtml(s.repo || s.url || s.host + '/' + s.repo || 'N/A')}</code>
                            </div>
                        `).join('')}
                    </div>
                `;
            }).join('');
        }
        
        function getSourceIcon(type) {
            const icons = {
                'github_releases': '🐙',
                'gitlab_releases': '🦊',
                'html_page': '🌐',
                'mozilla_releases': '🦊',
                'text_file': '📄',
                'releasebot': '🤖',
                'custom_parser': '🔧'
            };
            return icons[type] || '📌';
        }
        
        function getSourceLabel(type) {
            const labels = {
                'github_releases': 'GitHub',
                'gitlab_releases': 'GitLab',
                'html_page': 'Release Notes',
                'mozilla_releases': 'Mozilla',
                'text_file': 'Text File',
                'releasebot': 'ReleaseBot',
                'custom_parser': 'Custom'
            };
            return labels[type] || type;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
